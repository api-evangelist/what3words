aid: what3words
url: https://raw.githubusercontent.com/api-evangelist/what3words/refs/heads/main/apis.yml
name: what3words
kind: company
description: >-
  what3words has divided the world into a grid of three-metre squares and
  given each one a unique three-word address (e.g. ///filled.count.soap). The
  what3words Public API converts between three-word addresses and latitude /
  longitude coordinates, offers an AutoSuggest with autocorrect for
  voice/typing input, exposes supported languages and locale variants, and
  returns grid sections as GeoJSON. The API is HTTPS GET only, authenticated
  by API key in a query parameter or X-Api-Key header, and is wrapped by
  official SDKs for Swift, Android, Java, JavaScript, Python, PHP, and .NET,
  plus UI components for map and OCR experiences.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Geocoding
  - Addressing
  - Location
  - Three Word Address
  - Maps
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis:
  - aid: what3words:public-api
    name: what3words Public API
    description: >-
      REST API for converting between three-word addresses and latitude /
      longitude coordinates, with AutoSuggest, available-languages, and
      grid-section endpoints. JSON or GeoJSON response formats. Authenticated
      via the X-Api-Key header or a key query parameter.
    humanURL: https://developer.what3words.com/public-api/docs
    baseURL: https://api.what3words.com/v3
    tags:
      - REST API
      - Geocoding
      - Addressing
    properties:
      - type: Documentation
        url: https://developer.what3words.com/public-api/docs
      - type: Repository
        url: https://github.com/what3words/what3words-api-docs
  - aid: what3words:convert-to-3wa
    name: what3words convert-to-3wa Endpoint
    description: >-
      Converts a latitude / longitude coordinate into a three-word address in
      a chosen language.
    humanURL: https://developer.what3words.com/public-api/docs#convert-to-3wa
    baseURL: https://api.what3words.com/v3/convert-to-3wa
    tags:
      - Reverse Geocoding
      - Endpoint
    properties:
      - type: Documentation
        url: https://developer.what3words.com/public-api/docs#convert-to-3wa
  - aid: what3words:convert-to-coordinates
    name: what3words convert-to-coordinates Endpoint
    description: >-
      Converts a three-word address into a latitude / longitude coordinate and
      a bounding square.
    humanURL: https://developer.what3words.com/public-api/docs#convert-to-coordinates
    baseURL: https://api.what3words.com/v3/convert-to-coordinates
    tags:
      - Forward Geocoding
      - Endpoint
    properties:
      - type: Documentation
        url: https://developer.what3words.com/public-api/docs#convert-to-coordinates
  - aid: what3words:autosuggest
    name: what3words AutoSuggest Endpoint
    description: >-
      Validates and autocorrects partial or imperfect three-word input,
      returning ranked suggestions. Supports focus, clipping by polygon,
      country, bounding box or circle, and voice-input modes.
    humanURL: https://developer.what3words.com/public-api/docs#autosuggest
    baseURL: https://api.what3words.com/v3/autosuggest
    tags:
